services:
  fathom:
    image: ghcr.io/anejckl/fathom:latest
    container_name: fathom
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Authentication — set FATHOM_PASSWORD to enable login (leave empty to disable)
      - FATHOM_USER=admin
      - FATHOM_PASSWORD=changeme
      - FATHOM_SECRET=change-this-to-a-random-secret-key
      # Optional: enables free-form NL search (e.g. "what crashed today")
      # Without this, the built-in parser handles time/level/container queries just fine.
      # - OLLAMA_URL=http://ollama:11434
      # - OLLAMA_MODEL=llama3.2:latest
      - RETENTION_DAYS=30
      - RATE_LIMIT=20
      - TZ=Europe/London
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fathom-data:/data

volumes:
  fathom-data:
